<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css"
      integrity="sha512-1sCRPdkRXhBV2PBLUdRb4tMg1w2YPf37qatUFeS7zlBy7jJI8Lf4VHwWfZZfpXtYSLy85pkm9GaYVYMfw5BC1A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <img src="" alt="" />
        <h1>Todays Todo-s</h1>
      </header>
      <div class="form">
        <form action="" id="form-input">
          <input
            type="text"
            placeholder="Add new..."
            class="add-new"
            id="taskInput"
          />
          <button class="add" id="addButton">Add</button>
          <br />
          <div class="form-control">
            <input
            type="text"
            placeholder="filter"
            class="filter"
            id="filter"
          />
          <button class="clear-btn" id="clear-btn">
            Clear Items
          </button>
          </div>
        </form>
        <div class="todo-list" id="todoList">
          <ul id="item-list">
            <!-- <li class="todo-item">
              Cleaning Laptop
              <button
                class="remove-item btn-link text-magenta"
                id="remove-item"
              >
                <i class="fa-solid fa-trash"></i>
              </button> -->
            </li>
          </ul>
        </div>
        
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>

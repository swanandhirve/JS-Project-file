<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1 class="title">50/30/20</h1>

    <div class="heading-container">
      <h2>Generate Your Financial Plan</h2>
    </div>
    <div class="form">
      <div class="salary-container">
        <input id="salary" type="text" placeholder="Salary">
      </div>

      <div class="expenses-container">
        <input id="loans" type="text" placeholder="Loans">
        <input id="bills" type="text" placeholder="Bills">
        <input id="needs" type="text" placeholder="Needs">
        <input id="wants" type="text" placeholder="Wants(Optional)">
        <input id="savings" type="text" placeholder="Savings(Optional)">
      </div>

      <div class="button-container">
        <button id="calculateBtn">Calculate</button>
      </div>
    </div>
  </div>
</body>

<script type="module" src="index.js"></script>

</html>
